<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- 装饰圆 -->
  <circle cx="950" cy="120" r="200" fill="url(#card)" />
  <circle cx="200" cy="500" r="150" fill="url(#card)" />

  <!-- 主体卡片 -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="2" />

  <!-- Logo 图标 -->
  <g transform="translate(140, 140)">
    <rect width="64" height="64" rx="14" fill="rgba(255,255,255,0.2)" />
    <path d="M32 20 L42 30 L32 40 L22 30 Z" fill="white" />
    <path d="M32 40 L42 50 L32 44 L22 50 Z" fill="rgba(255,255,255,0.7)" />
  </g>

  <!-- 主标题 -->
  <text x="224" y="180" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="600" fill="rgba(255,255,255,0.8)">
    少年数字乡建
  </text>

  <!-- 大标题 -->
  <text x="140" y="300" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="72" font-weight="700" fill="white">
    我们的家乡
  </text>

  <!-- 副标题 -->
  <text x="140" y="370" font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.9)">
    乡村少年 STEM 协作学习平台
  </text>

  <!-- 底部标签 -->
  <g transform="translate(140, 440)">
    <rect width="120" height="40" rx="20" fill="rgba(255,255,255,0.15)" />
    <text x="60" y="26" font-family="sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">STEM 教育</text>
  </g>
  <g transform="translate(280, 440)">
    <rect width="120" height="40" rx="20" fill="rgba(255,255,255,0.15)" />
    <text x="60" y="26" font-family="sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">协作学习</text>
  </g>
  <g transform="translate(420, 440)">
    <rect width="120" height="40" rx="20" fill="rgba(255,255,255,0.15)" />
    <text x="60" y="26" font-family="sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">乡村教育</text>
  </g>
</svg>
