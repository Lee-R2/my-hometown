<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>离线模式</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 1rem;
      padding: 2.5rem 1.5rem;
      max-width: 24rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .icon {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
      border-radius: 50%;
    }
    .icon svg { width: 2rem; height: 2rem; color: #6b7280; }
    h1 {
      font-size: 1.25rem;
      color: #111827;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    p {
      font-size: 0.9375rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      min-height: 44px;
      min-width: 44px;
    }
    .btn:hover { background: #4338ca; }
    .btn:active { background: #3730a3; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038A5.25 5.25 0 0 1 12 13.5c1.398 0 2.682.544 3.653 1.438M6.873 12.514A8.25 8.25 0 0 1 12 10.5c2.03 0 3.889.73 5.328 1.938M3.561 8.992A11.25 11.25 0 0 1 12 6.75c2.86 0 5.489 1.064 7.5 2.825M2.25 5.25l19.5 19.5" />
      </svg>
    </div>
    <h1>您当前处于离线状态</h1>
    <p>网络连接已断开，请检查网络设置后重试。您可以在恢复网络后刷新页面继续使用。</p>
    <button class="btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:1rem;height:1rem;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      重新加载
    </button>
  </div>
</body>
</html>
